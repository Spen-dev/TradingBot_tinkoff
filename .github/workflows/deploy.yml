name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.VPS_HOST }}" ] && missing="$missing VPS_HOST"
          [ -z "${{ secrets.VPS_USER }}" ] && missing="$missing VPS_USER"
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing="$missing VPS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Не заданы GitHub Actions secrets:$missing"
            echo "Локально: gh auth login, затем .\scripts\setup_github_secrets.ps1"
            echo "Или вручную: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            cd /opt/TradingBot_tinkoff
            PRE=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main
            POST=$(git rev-parse HEAD)

            changed_files=""
            if [ "$PRE" != "$POST" ]; then
              changed_files=$(git diff --name-only "$PRE" "$POST")
            fi

            rebuild=false
            compose_changed=false
            if ! docker image inspect tinkoff_bot:latest >/dev/null 2>&1; then
              rebuild=true
              compose_changed=true
            elif echo "$changed_files" | grep -qE '^(Dockerfile|pyproject\.toml)$'; then
              rebuild=true
            fi
            if echo "$changed_files" | grep -qE '^docker-compose\.yml$'; then
              compose_changed=true
            fi

            if $rebuild; then
              echo "Rebuilding image (Dockerfile or pyproject.toml changed)..."
              used_pct=$(df / | awk 'NR==2 {gsub(/%/,"",$5); print $5}')
              if [ "${used_pct:-0}" -ge 85 ]; then
                echo "Disk ${used_pct}% — pruning Docker cache before build..."
                docker builder prune -af || true
                docker image prune -af || true
                df -h /
              fi
              docker compose build
              compose_changed=true
            else
              echo "Code-only change: skip docker build."
            fi

            if [ -f .env ]; then
              if grep -q '^SANDBOX_TARGET_CASH=' .env; then
                sed -i 's/^SANDBOX_TARGET_CASH=.*/SANDBOX_TARGET_CASH=200000/' .env
              else
                echo 'SANDBOX_TARGET_CASH=200000' >> .env
              fi
            else
              echo 'SANDBOX_TARGET_CASH=200000' > .env
            fi
            if $compose_changed; then
              docker compose up -d
            fi
            docker compose restart bot
            sleep 20
            docker compose exec -T bot python scripts/sync_sandbox_balance.py || true
            docker compose exec -T bot python scripts/prepare_observation_start.py --update-baseline-only || true
            docker compose exec -T bot python scripts/preflight_run.py || true
            docker compose ps
            curl -sf http://127.0.0.1:8000/health || true
