name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # T-Invest SDK (tbank.ru): сертификат Минцифры, домен tbank.ru
          pip install --no-cache-dir "t-tech-investments==1.49.2" --index-url https://opensource.tbank.ru/api/v4/projects/238/packages/pypi/simple
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -q
