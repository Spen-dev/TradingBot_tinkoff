name: Reset sandbox

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.VPS_HOST }}" ] && missing="$missing VPS_HOST"
          [ -z "${{ secrets.VPS_USER }}" ] && missing="$missing VPS_USER"
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing="$missing VPS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Не заданы GitHub Actions secrets:$missing"
            exit 1
          fi

      - name: Reset sandbox on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/TradingBot_tinkoff
            git fetch origin main
            git reset --hard origin/main
            docker compose stop bot
            docker compose run --rm --no-deps bot python reset_sandbox.py
            docker compose up -d
            sleep 25
            docker compose exec -T bot python scripts/prepare_observation_start.py --force --reset-learned || true
            docker compose exec -T bot python scripts/preflight_run.py || true
            docker compose ps
            curl -sf http://127.0.0.1:8000/health || true
