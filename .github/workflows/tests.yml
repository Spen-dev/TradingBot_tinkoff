name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # SDK как в Dockerfile: пакет с GitHub + зависимости вручную (PyPI-карантин tinkoff-investments).
          pip install --no-cache-dir --no-deps "tinkoff-investments @ git+https://github.com/Tinkoff/invest-python.git"
          pip install --no-cache-dir "cachetools>=5.2.0,<6" "grpcio>=1.39.0,<2.0.0" "protobuf>=4.21.6,<5.0.0" "python-dateutil>=2.8.2,<3.0.0" "deprecation>=2.1.0,<3.0.0"
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v
