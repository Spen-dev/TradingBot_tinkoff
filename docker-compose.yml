# Запуск робота на VPS (секреты из .env на сервере)
services:
  bot:
    build: .
    image: tinkoff_bot:latest
    container_name: tinkoff_bot
    restart: unless-stopped
    env_file: .env
    environment:
      SSL_TBANK_VERIFY: "True"
    volumes:
      - ./data:/app/data
      - ./learned_params:/app/learned_params
      - .:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=8); exit(0 if r.status==200 else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
