version: '3.8'

services:
  trading-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: trading-bot
    restart: unless-stopped
    environment:
      - MODE=${MODE:-sandbox}
      - TINKOFF_TOKEN_SANDBOX=${TINKOFF_TOKEN_SANDBOX}
      - TINKOFF_TOKEN_REAL=${TINKOFF_TOKEN_REAL}
      - ACCOUNT_ID_REAL=${ACCOUNT_ID_REAL}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID}
      - PORTFOLIO_SIZE=${PORTFOLIO_SIZE:-15000}
      - REBALANCE_THRESHOLD=${REBALANCE_THRESHOLD:-10}
      - TZ=${TZ:-Europe/Moscow}
    volumes:
      - ../data:/data
      - ../logs:/logs
      - ../models:/models
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge